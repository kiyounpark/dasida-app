<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DASIDA Journey Green Move Prototype</title>
    <style>
      :root {
        --paper: #f4ecdb;
        --paper-deep: #ebdfc9;
        --ink: #1f1913;
        --green: #2d7b48;
        --green-dark: #1f6137;
        --green-soft: rgba(45, 123, 72, 0.17);
        --green-soft-strong: rgba(45, 123, 72, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 12%, rgba(255, 255, 255, 0.8), transparent 24%),
          radial-gradient(circle at 82% 14%, rgba(255, 255, 255, 0.7), transparent 20%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 36%),
          var(--paper);
        font-family:
          "SUIT", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.2;
        background-image:
          radial-gradient(circle at 10% 10%, rgba(104, 84, 52, 0.12) 0 0.7px, transparent 1.2px),
          radial-gradient(circle at 80% 24%, rgba(104, 84, 52, 0.1) 0 0.9px, transparent 1.5px),
          radial-gradient(circle at 42% 72%, rgba(104, 84, 52, 0.09) 0 0.8px, transparent 1.4px);
        background-size: 150px 150px, 210px 210px, 190px 190px;
      }

      .wrap {
        width: min(92vw, 430px);
        padding: 20px 0;
      }

      .poster {
        position: relative;
        width: 100%;
        aspect-ratio: 768 / 1365;
        overflow: hidden;
        border-radius: 22px;
        background:
          radial-gradient(circle at 22% 36%, rgba(45, 123, 72, 0.08), transparent 16%),
          radial-gradient(circle at 74% 68%, rgba(45, 123, 72, 0.05), transparent 18%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.04)),
          var(--paper);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.72),
          0 22px 60px rgba(90, 72, 41, 0.14);
      }

      .poster::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 14% 10%, rgba(255, 255, 255, 0.42), transparent 18%),
          radial-gradient(circle at 85% 7%, rgba(255, 255, 255, 0.34), transparent 17%);
      }

      .artboard {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .title-main {
        font-size: 34px;
        font-weight: 800;
        fill: var(--ink);
        letter-spacing: -0.05em;
      }

      .title-brand {
        font-size: 44px;
        font-weight: 900;
        fill: var(--green);
        stroke: #181410;
        stroke-width: 2.2px;
        paint-order: stroke fill;
        letter-spacing: 0.02em;
      }

      .title-brand-shadow {
        font-size: 44px;
        font-weight: 900;
        fill: rgba(31, 25, 19, 0.32);
        transform: translate(2px, 3px);
      }

      .journey-line {
        fill: none;
        stroke: rgba(31, 25, 19, 0.88);
        stroke-width: 4.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .journey-line-thin {
        fill: none;
        stroke: rgba(31, 25, 19, 0.76);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .dash-line {
        fill: none;
        stroke: rgba(31, 25, 19, 0.82);
        stroke-width: 3.3;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 10 14;
      }

      .green-arrow {
        fill: none;
        stroke: var(--green);
        stroke-width: 7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .bubble {
        fill: rgba(255, 252, 245, 0.96);
        stroke: rgba(31, 25, 19, 0.92);
        stroke-width: 2.6;
      }

      .bubble-text {
        fill: var(--ink);
        font-size: 13px;
        font-weight: 700;
        text-anchor: middle;
      }

      .step-title {
        fill: var(--ink);
        font-size: 14px;
        font-weight: 800;
      }

      .step-state {
        fill: var(--ink);
        font-size: 13px;
        font-weight: 700;
      }

      .small-note {
        fill: var(--ink);
        font-size: 12px;
        font-weight: 700;
      }

      .button-label {
        fill: #fff;
        font-size: 21px;
        font-weight: 800;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
      }

      .footer-icon {
        fill: none;
        stroke: rgba(31, 25, 19, 0.95);
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .asset-image {
        display: none;
      }

      .mascot line,
      .mascot rect,
      .mascot ellipse,
      .mascot circle,
      .mascot path {
        fill: none;
        stroke: rgba(31, 25, 19, 0.96);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .mascot .fill-dark {
        fill: rgba(31, 25, 19, 0.96);
        stroke: rgba(31, 25, 19, 0.96);
      }

      .mascot .fill-paper {
        fill: rgba(255, 251, 242, 0.98);
      }

      .mascot .shadow-backdrop {
        fill: rgba(31, 25, 19, 0.98);
        stroke: none;
      }

      .halo-wrap {
        filter: url(#glow);
      }

      .halo-soft {
        fill: var(--green-soft-strong);
      }

      .halo-ring {
        fill: none;
        stroke: rgba(45, 123, 72, 0.92);
        stroke-width: 4;
      }

      .halo-ring-second {
        fill: none;
        stroke: rgba(45, 123, 72, 0.74);
        stroke-width: 2.4;
      }

      .traveler-dot {
        fill: rgba(45, 123, 72, 0.96);
        stroke: rgba(31, 25, 19, 0.88);
        stroke-width: 2;
        filter: url(#glow);
      }

      .portal-ring {
        fill: rgba(45, 123, 72, 0.22);
        stroke: rgba(31, 25, 19, 0.84);
        stroke-width: 2;
      }

      .cta-button {
        cursor: pointer;
        transition: transform 140ms ease, filter 140ms ease;
      }

      .cta-button:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      .cta-button:active {
        transform: translateY(0);
      }

      .status {
        position: absolute;
        left: 50%;
        top: 12px;
        transform: translateX(-50%);
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 252, 246, 0.72);
        border: 1px solid rgba(31, 25, 19, 0.12);
        color: rgba(31, 25, 19, 0.76);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.01em;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>

      const pathData = [
        "M342 468 C 436 424, 518 470, 564 672",
        "M535 724 C 465 817, 347 885, 244 916",
        "M286 956 C 392 988, 470 1035, 548 1081",
      ];

      const pathCache = pathData.map((data) => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", data);
        return path;
      });

      const steps = [
        "STEP 1 활성화 상태. 첨부 이미지처럼 초록 하이라이트가 첫 번째 진단 단계에 머물러 있습니다.",
        "STEP 2로 이동했습니다. 초록 표시가 다음 단계로 이동하며 현재 위치를 강조합니다.",
        "STEP 3로 이동했습니다. 분석 이후 연습 단계가 열리는 느낌만 프로토타입으로 표현했습니다.",
        "STEP 4로 이동했습니다. 마지막 단계까지 도착한 뒤 다시 누르면 처음 상태로 돌아갑니다.",
      ];

      let activeIndex = 0;
      let isAnimating = false;

      function updateButtonLabel() {
        ctaLabel.textContent = activeIndex === stepAnchors.length - 1 ? "처음으로 돌아가기" : "다음 단계 시작하기";
      }

      function bindImageAssets() {
        imageSlots.forEach(({ imageId, fallbackId, src }) => {
          const image = document.getElementById(imageId);
          const fallback = document.getElementById(fallbackId);
          const probe = new Image();

          probe.onload = () => {
            image.setAttribute("href", src);
            image.style.display = "block";
            fallback.style.display = "none";
          };

          probe.onerror = () => {
            image.style.display = "none";
            fallback.style.display = "inline";
          };

          probe.src = src;
        });
      }

      function updateHalo(index) {
        const anchor = stepAnchors[index];
        haloSoft.setAttribute("cx", anchor.x);
        haloSoft.setAttribute("cy", anchor.y);
        haloSoft.setAttribute("rx", anchor.rx);
        haloSoft.setAttribute("ry", anchor.ry);
        haloOuter.setAttribute("d", anchor.halo);
        haloInner.setAttribute("d", anchor.halo2);
        portalRing.setAttribute("cx", anchor.x + 135);
        portalRing.setAttribute("cy", anchor.y - 34);
      }

      function updateStates() {
        stepGroups.forEach((group, index) => {
          const title = group.querySelector(".step-state");

          if (index === activeIndex) {
            title.textContent = index === 0 ? "진행 중" : "활성화";
            group.style.opacity = "1";
          } else if (index < activeIndex) {
            title.textContent = "완료";
            group.style.opacity = "0.9";
          } else if (index === activeIndex + 1) {
            title.textContent = "대기 중";
            group.style.opacity = "1";
          } else {
            title.textContent = "잠김";
            group.style.opacity = "0.92";
          }
        });

        statusText.textContent = steps[activeIndex];
        updateButtonLabel();
      }

      function setDotPosition(x, y) {
        travelDot.setAttribute("cx", x);
        travelDot.setAttribute("cy", y);
      }

      function moveToStep(nextIndex) {
        if (isAnimating) {
          return;
        }

        if (nextIndex === 0 && activeIndex === stepAnchors.length - 1) {
          activeIndex = 0;
          updateHalo(activeIndex);
          setDotPosition(stepAnchors[0].x + 135, stepAnchors[0].y - 34);
          updateStates();
          return;
        }

        const pathIndex = activeIndex;
        const path = pathCache[pathIndex];
        const totalLength = path.getTotalLength();
        const duration = 1350;
        const start = performance.now();
        isAnimating = true;
        ctaButton.style.pointerEvents = "none";

        function animate(now) {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const point = path.getPointAtLength(totalLength * eased);
          setDotPosition(point.x, point.y);

          const from = stepAnchors[activeIndex];
          const to = stepAnchors[nextIndex];
          const mix = eased;

          haloSoft.setAttribute("cx", from.x + (to.x - from.x) * mix);
          haloSoft.setAttribute("cy", from.y + (to.y - from.y) * mix);
          haloSoft.setAttribute("rx", from.rx + (to.rx - from.rx) * mix);
          haloSoft.setAttribute("ry", from.ry + (to.ry - from.ry) * mix);

          if (progress < 1) {
            requestAnimationFrame(animate);
            return;
          }

          activeIndex = nextIndex;
          updateHalo(activeIndex);
          setDotPosition(stepAnchors[activeIndex].x + 135, stepAnchors[activeIndex].y - 34);
          updateStates();
          isAnimating = false;
          ctaButton.style.pointerEvents = "auto";
        }

        requestAnimationFrame(animate);
      }

      ctaButton.addEventListener("click", () => {
        if (activeIndex === stepAnchors.length - 1) {
          moveToStep(0);
          return;
        }

        moveToStep(activeIndex + 1);
      });

      bindImageAssets();
      updateHalo(activeIndex);
      setDotPosition(stepAnchors[0].x + 135, stepAnchors[0].y - 34);
      updateStates();
    </script>
  </body>
</html>

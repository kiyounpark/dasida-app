<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>다시다 — 틀린 문제, 왜 틀렸는지 알려줌</title>
<style>
  :root {
    --cream: #FBF7EF;
    --cream-2: #F3ECDD;
    --green: #1F3B30;
    --green-soft: #2E5344;
    --ink: #26221B;
    --muted: #7A7263;
    --line: #E4DAC6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: "SUIT", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap { width: 100%; max-width: 480px; padding: 40px 22px 60px; }
  .brand { font-size: 15px; font-weight: 800; color: var(--green); letter-spacing: -0.2px; }
  h1 { font-size: 26px; font-weight: 800; line-height: 1.35; letter-spacing: -0.5px; margin: 22px 0 10px; }
  h1 .hl { color: var(--green); }
  .sub { font-size: 15px; line-height: 1.6; color: var(--muted); margin: 0 0 28px; }
  .drop {
    border: 1.5px dashed var(--line); background: #fff; border-radius: 18px;
    padding: 40px 20px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop:hover, .drop.over { border-color: var(--green-soft); background: var(--cream-2); }
  .drop .icon { font-size: 34px; }
  .drop .big { font-size: 16px; font-weight: 700; margin-top: 12px; }
  .drop .small { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .picked { display: none; margin-top: 14px; font-size: 14px; font-weight: 700; color: var(--green); }
  .steps { margin: 30px 0 0; padding: 0; list-style: none; }
  .steps li {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 0; border-top: 1px solid var(--line); font-size: 14px; line-height: 1.5;
  }
  .steps li .n {
    flex: 0 0 22px; height: 22px; border-radius: 50%;
    background: var(--green); color: #fff; font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .cta {
    display: block; width: 100%; margin-top: 26px;
    background: var(--green); color: #fff; border: 0; border-radius: 14px;
    padding: 16px; font-size: 16px; font-weight: 800; cursor: pointer;
    opacity: .45; pointer-events: none; transition: opacity .15s; font-family: inherit;
  }
  .cta.ready { opacity: 1; pointer-events: auto; }
  .foot { margin-top: 18px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.5; }
  .tag { display:inline-block; font-size:11px; font-weight:700; color:var(--green-soft); background:var(--cream-2); border:1px solid var(--line); border-radius:999px; padding:4px 10px; }

  /* --- 채팅 화면 --- */
  .screen[hidden] { display: none; }
  .thread { display: flex; flex-direction: column; gap: 10px; padding: 8px 0 24px; }
  .bubble { max-width: 88%; padding: 12px 14px; border-radius: 16px; font-size: 15px; line-height: 1.55; white-space: pre-wrap; }
  .bubble.coach { background: #fff; border: 1px solid var(--line); align-self: flex-start; border-top-left-radius: 4px; }
  .bubble.me { background: var(--green); color: #fff; align-self: flex-end; border-top-right-radius: 4px; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
  .card .card-title { font-weight: 800; font-size: 15px; margin-bottom: 6px; }
  .card .card-body { font-size: 14px; line-height: 1.6; color: var(--ink); }
  .card.final { border-color: var(--green-soft); background: var(--cream-2); }
  .actions { display: flex; flex-direction: column; gap: 8px; padding: 6px 0 30px; }
  .actions button {
    border: 1.5px solid var(--green-soft); background: #fff; color: var(--green);
    border-radius: 12px; padding: 13px 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit; text-align: left;
  }
  .actions button.primary { background: var(--green); color: #fff; border-color: var(--green); }
  .actions button.ghost { border-color: var(--line); color: var(--muted); font-weight: 500; }
  .spinner { text-align: center; padding: 60px 0; color: var(--muted); font-size: 15px; }
  .fallback-input { width: 100%; border: 1.5px solid var(--line); border-radius: 12px; padding: 13px; font-size: 15px; font-family: inherit; }
</style>
</head>
<body>
  <main class="wrap">
    <div class="brand">다시다</div>

    <!-- 화면 1: 업로드 -->
    <section class="screen" id="screen-upload">
      <h1>틀린 문제만 찍어서 올려줘<br /><span class="hl">왜 틀렸는지</span> 알려줄게</h1>
      <p class="sub">채점은 이미 했잖아. 틀린 문제 하나, 풀이 흔적까지 나오게 찍으면 돼.</p>
      <div class="drop" id="drop">
        <div class="icon">📸</div>
        <div class="big">틀린 문제 사진 올리기</div>
        <div class="small">풀이 쓴 부분까지 한 장에 나오게</div>
        <div class="picked" id="picked"></div>
        <input type="file" id="file" accept="image/*" hidden />
      </div>
      <ol class="steps">
        <li><span class="n">1</span><span>틀린 문제 하나를 풀이까지 나오게 찍는다</span></li>
        <li><span class="n">2</span><span>AI가 풀이를 읽고 어디서 막혔는지 찾는다</span></li>
        <li><span class="n">3</span><span>질문 몇 개로 진짜 약점을 확정한다</span></li>
      </ol>
      <button class="cta" id="cta">분석 시작</button>
      <p class="foot"><span class="tag">지금 무료</span><br />설치·로그인 없음 · 사진은 분석에만 쓰고 원문은 안 남김</p>
    </section>

    <!-- 화면 2: 분석 중 -->
    <section class="screen" id="screen-analyzing" hidden>
      <div class="spinner">풀이 읽는 중… (10초 정도)</div>
    </section>

    <!-- 화면 3: 진단 대화 -->
    <section class="screen" id="screen-chat" hidden>
      <div class="thread" id="thread"></div>
      <div class="actions" id="actions"></div>
    </section>
  </main>
  <script src="./flow-bundle.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이 문제, 왜 틀렸는지 30초 만에 알 수 있어요 | 다시다</title>
  <meta property="og:title" content="6월 모평 수학 21번, 어디서 무너졌는지 30초 진단" />
  <meta property="og:description" content="풀 줄 아는 문제를 또 틀리는 이유 — 풀이의 어느 단계가 어긋났는지 짚어드려요." />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">

    <!-- 상태 1: 문제 -->
    <section id="screen-problem">
      <p class="hook" id="hook-text"></p>
      <p class="source-label" id="source-label"></p>
      <img id="problem-image" alt="6월 모평 수학 21번 문제" />
      <form id="answer-form">
        <label for="answer-input" class="answer-label">정답 (자연수)</label>
        <input id="answer-input" type="number" inputmode="numeric" min="1" max="999"
               placeholder="답을 입력하세요" required />
        <button type="submit" class="btn-primary">채점하기</button>
      </form>
      <button id="btn-skip" type="button" class="btn-secondary">6모 때 틀렸던 문제예요 — 어디서 막혔는지 볼래요</button>
      <p class="skip-hint">기억 안 나도 괜찮아요. 선택지 보면 떠올라요.</p>
    </section>

    <!-- 상태 2: 진단 대화 (앱의 약점 진단 채팅 UI 이식) -->
    <section id="screen-chat" hidden>
      <div id="chat-thread" class="chat-thread"></div>
      <div id="chat-actions" class="chat-actions"></div>
    </section>

    <!-- 상태 4: 약점 정리 페이지 (앱 done-view 스탬프 스타일) -->
    <section id="screen-summary" hidden>
      <div class="stamp">
        <div class="stamp-ring">
          <span class="stamp-ko" id="stamp-ko">완 료</span>
          <span class="stamp-en" id="stamp-en">REVIEWED</span>
        </div>
        <span class="stamp-leaf" id="stamp-leaf">🌿</span>
      </div>
      <h2 class="summary-title" id="summary-title"></h2>
      <p class="summary-sub" id="summary-sub"></p>
      <div class="summary-card">
        <span class="summary-card-label" id="summary-card-label"></span>
        <span class="summary-card-val" id="summary-weakness"></span>
        <p class="summary-card-desc" id="summary-desc"></p>
      </div>
      <p class="source-note" id="summary-note" hidden></p>
      <a class="btn-primary" id="store-link"
         href="https://apps.apple.com/kr/app/dasida" target="_blank" rel="noopener">다시다는 네 모든 오답에 이걸 해요</a>
      <p class="cta-sub">강요 아님. 이 페이지만 써도 돼요.</p>
    </section>

  </main>
  <script src="./problem-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
